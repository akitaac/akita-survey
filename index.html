<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Akita Air Conditioning</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1a2e4a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Arial,sans-serif}
  .wrap{text-align:center;padding:40px 20px}
  img{height:60px;margin-bottom:20px}
  p{color:rgba(255,255,255,.7);font-size:14px}
  .dot{display:inline-block;width:8px;height:8px;background:#2e7fbf;border-radius:50%;margin:0 3px;animation:bounce .8s infinite}
  .dot:nth-child(2){animation-delay:.15s}
  .dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
</style>
</head>
<body>
<div class="wrap">
  <img src="https://cdn.shopify.com/s/files/1/0906/1780/7181/files/akita-logo-cartoon-husky-sunglasses-coat.png?v=1773353080" alt="Akita AC">
  <p>Loading your quote<br><br>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </p>
</div>
<script>
  const SCRIPT_URL = 'https://script.google.com/a/akita.ac/macros/s/AKfycbwPZPZCl1emzTgsLeGv3ns-i1f_gt8fmOoh6JCt0D35o_v4BJVuNzHwK9dNcHfAxEaF/exec';
  const path   = window.location.pathname.replace(/^\//, '').trim();
  const params = new URLSearchParams(window.location.search);
  const type   = params.get('type') || 'quote';
  if(path){
    window.location.replace(SCRIPT_URL + '?id=' + encodeURIComponent(path) + '&type=' + type);
  } else {
    window.location.replace('https://akita.ac');
  }
</script>
</body>
</html>
